<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mkulima Forum - Agricultural Community">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mkulima Forum">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Mkulima Forum</title>
  <style>
    body { background-color: #1a1a2e; margin: 0; }
    .loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #4CAF50;
      font-family: Arial, sans-serif;
      font-size: 18px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #4CAF50;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Inapakia Mkulima Forum...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
