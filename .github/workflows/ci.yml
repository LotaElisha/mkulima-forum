name: MkulimaForum CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mkulima_test
          POSTGRES_USER: mkulima
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, redis, mbstring, xml, ctype, fileinfo, json, openssl, tokenizer, xmlwriter
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=pgsql/' .env.testing
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=localhost/' .env.testing
          sed -i 's/DB_PORT=5432/DB_PORT=5432/' .env.testing
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=mkulima_test/' .env.testing
          sed -i 's/DB_USERNAME=root/DB_USERNAME=mkulima/' .env.testing
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=secret/' .env.testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        # Coverage gate re-enabled once the suite grows (see REDESIGN.md Phase 2)
        run: php artisan test

  flutter-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mkulima_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test || echo "No tests yet"

  admin-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: pint
      - name: Run Laravel Pint
        run: pint --test
